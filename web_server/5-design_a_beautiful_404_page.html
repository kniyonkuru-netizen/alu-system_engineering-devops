<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 - Ceci n'est pas une page</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1f1c2c, #928dab);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #fff;
    text-align: center;
  }
  .container {
    max-width: 600px;
    padding: 40px;
  }
  h1 {
    font-size: 8rem;
    margin: 0;
    letter-spacing: 10px;
    text-shadow: 0 0 20px rgba(255,255,255,0.4);
  }
  p.subtitle {
    font-size: 1.4rem;
    margin-top: -10px;
    opacity: 0.85;
  }
  .pipe {
    width: 220px;
    height: 220px;
    margin: 20px auto;
    border: 6px solid #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  a {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 28px;
    background: #fff;
    color: #1f1c2c;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    transition: transform 0.2s ease;
  }
  a:hover {
    transform: scale(1.05);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="pipe">🚧</div>
    <h1>404</h1>
    <p class="subtitle">Ceci n'est pas une page</p>
    <p>The page you are looking for wandered off somewhere it shouldn't have.</p>
    <a href="/">Take me home</a>
  </div>
</body>
</html>
